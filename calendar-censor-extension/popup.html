<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calendar Title Censor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <div class="header">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Title Censor</h1>
          <p id="status">Checking this tab...</p>
        </div>
      </div>

      <button id="toggle" class="toggle" type="button" disabled>
        <span class="toggle-icon" aria-hidden="true"></span>
        <span id="toggle-label">Toggle titles</span>
      </button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
